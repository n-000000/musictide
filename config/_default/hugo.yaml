baseURL: https://musictide.pages.dev/
defaultContentLanguage: pt
defaultContentLanguageInSubdir: false
enableRobotsTXT: true
enableEmoji: true

module:
  hugoVersion:
    min: "0.141.0"
    extended: true

pagination:
  pagerSize: 100

imaging:
  anchor: Center

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  tag: tags
  category: categories
  author: authors
  series: series
  event: events

related:
  threshold: 0
  toLower: false
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 100
    - name: series
      weight: 50
    - name: authors
      weight: 20
    - name: events
      weight: 80
    - name: date
      weight: 10
      pattern: "200601"   # match by year+month
