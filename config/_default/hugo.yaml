baseURL: https://musictide.pages.dev/
defaultContentLanguage: pt
defaultContentLanguageInSubdir: false
enableRobotsTXT: true
enableEmoji: true

module:
  hugoVersion:
    min: "0.141.0"
    extended: true

pagination:
  pagerSize: 100

imaging:
  anchor: Center

outputFormats:
  fragment:
    name: fragment
    baseName: fragment
    mediaType: text/html
    isHTML: true
    notAlternative: true
  grid-fragment:
    name: grid-fragment
    baseName: grid-fragment
    mediaType: text/html
    isHTML: true
    notAlternative: true
  feed-fragment:
    name: feed-fragment
    baseName: feed-fragment
    mediaType: text/html
    isHTML: true
    notAlternative: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
  term:
    - HTML
    - feed-fragment
    - grid-fragment
  page:
    - HTML
    - fragment

taxonomies:
  category: categories

related:
  threshold: 0
  toLower: false
  indices:
    - name: categories
      weight: 100
    - name: date
      weight: 10
      pattern: "200601"
