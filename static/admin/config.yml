backend:
  name: github
  repo: n-000000/musictide
  branch: main
  base_url: https://sveltia-cms-auth.leftfield.workers.dev

local_backend: true

site_url: https://musictide.pages.dev

media_libraries:
  cloudflare_r2:
    access_key_id: 0bd0a95fb73f463fa74a8cfd52ae8ec6
    bucket: musictide-media
    account_id: 43220b81420989e7198287bd4559a701
    public_url: https://pub-576ea11202f543d0bf28d36ef63d18ff.r2.dev

collections:

  # ── ARTIGOS ──────────────────────────────────────────────────
  - name: posts
    label: Artigos
    label_singular: Artigo
    folder: content/posts
    create: true
    preview_path: "posts/{{slug}}"
    fields:

      - label: Evento
        name: event
        widget: relation
        collection: events
        search_fields: [title]
        value_field: title
        display_fields: [title]
        dropdown_threshold: 0
        required: false
        hint: "Escolha o evento — pesquise pelo nome"

      - label: Título
        name: title
        widget: string

      - label: Data
        name: date
        widget: datetime
        date_format: YYYY/MM/DD
        time_format: HH:mm
        format: YYYY-MM-DDTHH:mm:ssZ
        default: "{{now}}"

      - label: Imagem de Capa
        name: featureimage
        widget: image
        required: false
        hint: "Imagem principal do artigo (hero/capa)"

      - label: Legenda da Capa
        name: featureimagecaption
        widget: string
        required: false
        hint: "Legenda da imagem de capa"

      - label: Autor
        name: author
        widget: string
        required: false
        hint: "Deixe em branco se for o autor principal"

      - label: Texto
        name: body
        widget: text
        hint: "Use #palavrachave no texto para marcar tags (ex: concerto #metal #rock). As tags são extraídas ao gravar."

      - label: Galeria
        name: gallery
        widget: image
        multiple: true
        required: false
        hint: "Seleccione várias imagens de uma vez"

      - label: Rascunho
        name: draft
        widget: boolean
        default: true

  # ── PUBLICIDADE ──────────────────────────────────────────────
  - name: ads
    label: Publicidade
    label_singular: Anúncio
    folder: content/ads
    create: true
    fields:

      - label: Título Interno
        name: title
        widget: string
        hint: "Nome interno — não visível no site"

      - label: Imagem
        name: creative_image
        widget: image
        hint: "Imagem do anúncio"

      - label: URL de Destino
        name: click_through_url
        widget: string
        pattern: ['^https?://', 'Deve ser uma URL válida (começar com http:// ou https://)']

      - label: Activo De
        name: active_from
        widget: datetime
        date_format: YYYY/MM/DD
        time_format: HH:mm
        format: YYYY-MM-DDTHH:mm:ssZ
        required: false
        hint: "Data de início de exibição"

      - label: Activo Até
        name: active_until
        widget: datetime
        date_format: YYYY/MM/DD
        time_format: HH:mm
        format: YYYY-MM-DDTHH:mm:ssZ
        required: false
        hint: "Data de fim de exibição"

      - label: Notas Internas
        name: notes
        widget: text
        required: false

      - label: Rascunho
        name: draft
        widget: boolean
        default: true

  # ── EVENTOS ──────────────────────────────────────────────────
  - name: events
    label: Eventos
    label_singular: Evento
    folder: content/events
    create: true
    identifier_field: title
    fields:

      - label: Nome
        name: title
        widget: string
        hint: "Ex: Vagos Metal Fest 2025, SonicBlast 2099"

  # ── COLABORADORES ─────────────────────────────────────────────
  - name: authors
    label: Colaboradores
    label_singular: Colaborador
    folder: content/authors
    create: true
    fields:

      - label: Nome
        name: title
        widget: string

      - label: Foto
        name: photo
        widget: image
        required: false

      - label: Bio
        name: body
        widget: text
        required: false

      - label: Email
        name: email
        widget: string
        required: false

      - label: Instagram
        name: instagram
        widget: string
        required: false
        hint: "Handle (ex: musictide_pt) ou URL completo (ex: https://instagram.com/musictide_pt)"

      - label: Facebook
        name: facebook
        widget: string
        required: false
        hint: "Handle (ex: musictide) ou URL completo (ex: https://facebook.com/musictide)"

      - label: X / Twitter
        name: x_twitter
        widget: string
        required: false
        hint: "Handle (ex: musictide ou @musictide) ou URL completo (ex: https://x.com/musictide)"

      - label: Bluesky
        name: bluesky
        widget: string
        required: false
        hint: "Handle (ex: musictide.bsky.social) ou URL completo (ex: https://bsky.app/profile/musictide.bsky.social)"

      - label: TikTok
        name: tiktok
        widget: string
        required: false
        hint: "Handle (ex: musictide ou @musictide) ou URL completo (ex: https://www.tiktok.com/@musictide)"

      - label: YouTube
        name: youtube
        widget: string
        required: false
        hint: "Handle (ex: musictide ou @musictide) ou URL completo (ex: https://youtube.com/@musictide)"

      - label: Spotify
        name: spotify
        widget: string
        required: false
        hint: "URL do perfil de artista ou playlist (ex: https://open.spotify.com/artist/...)"

      - label: Rascunho
        name: draft
        widget: boolean
        default: false

  # ── ESTILO DO SITE ────────────────────────────────────────────
  - name: settings
    label: Definições
    files:

      - label: Estilo Visual
        name: style
        file: data/style.yaml
        fields:

          - label: Esquema de Cores
            name: colorScheme
            widget: select
            options:
              - { label: "Dark Metal (preto, vermelho, âmbar)", value: dark-metal }
              - { label: "Goth (roxo escuro, violeta, rosa)", value: goth }
              - { label: "Punk (castanho quente, vermelho, verde-lima)", value: punk }
              - { label: "Indie (azul noite, coral, teal)", value: indie }
              - { label: "Minimal (cinzento, preto, pedra)", value: minimal }
              - { label: "Slab (azul-acinzentado, editorial)", value: slab }
              - { label: "Zinc (cinzento quente, âmbar)", value: zinc }
              - { label: "Swamp (verde escuro, dourado)", value: swamp }
              - { label: "Blowfish (padrão do tema)", value: blowfish }
              - { label: "Avocado", value: avocado }
              - { label: "Fire (vermelho, laranja)", value: fire }
              - { label: "Ocean (azul profundo)", value: ocean }
              - { label: "Forest (verde tema)", value: forest }
              - { label: "Bloody (vermelho intenso)", value: bloody }
              - { label: "Terminal (verde terminal)", value: terminal }
              - { label: "Neon", value: neon }
              - { label: "Marvel", value: marvel }
              - { label: "Noir (preto e branco)", value: noir }
              - { label: "Autumn (castanho, laranja)", value: autumn }
              - { label: "Congo", value: congo }
              - { label: "Princess", value: princess }
              - { label: "Slate (azul-cinza tema)", value: slate }
              - { label: "Github", value: github }
              - { label: "One Light", value: one-light }
            default: dark-metal
            hint: "Esquema de cores do site"

          - label: Tipo de Letra — Títulos
            name: heading_font
            widget: select
            options:
              - { label: "Sistema (padrão)", value: system }
              - { label: "Bebas Neue (impacto, metal)", value: bebas-neue }
              - { label: "Oswald (condensado, editorial)", value: oswald }
              - { label: "Antonio (alto, desportivo)", value: antonio }
              - { label: "Barlow Condensed (industrial, técnico)", value: barlow }
              - { label: "Fjalla One (editorial, forte)", value: fjalla }
              - { label: "Special Elite (máquina de escrever, punk)", value: special-elite }
              - { label: "Playfair Display (elegante, serifado)", value: playfair }
              - { label: "Inter (moderno, neutro)", value: inter }
              - { label: "Roboto Slab (sólido, serifado)", value: roboto-slab }
            default: system
            hint: "Tipo de letra para títulos e cabeçalhos"

          - label: Tipo de Letra — Texto
            name: body_font
            widget: select
            options:
              - { label: "Sistema (padrão)", value: system }
              - { label: "Inter (moderno, neutro)", value: inter }
              - { label: "Lato (limpo, legível)", value: lato }
              - { label: "Merriweather (literário, editorial)", value: merriweather }
              - { label: "Roboto Slab (sólido, serifado)", value: roboto-slab }
              - { label: "Playfair Display (elegante, serifado)", value: playfair }
            default: system
            hint: "Tipo de letra para o corpo do texto"

          - label: Layout da Homepage
            name: homepage_layout
            widget: select
            options:
              - { label: "Página (artigos recentes)", value: page }
              - { label: "Hero (último artigo em destaque)", value: hero }
              - { label: "Background (imagem de fundo + perfil)", value: background }
              - { label: "Card (perfil + imagem ao lado)", value: card }
              - { label: "Perfil (centrado)", value: profile }
            default: page
            hint: "Estrutura da página inicial"

          - label: Imagem da Homepage
            name: homepage_image
            widget: image
            required: false
            hint: "Fundo para os layouts Hero e Background (usado quando o último artigo não tem imagem)"

          - label: Estilo de Apresentação do Conteudo
            name: content_style
            widget: select
            options:
              - { label: "Cards largura total", value: cards-wide }
              - { label: "Cards (grelha)", value: cards }
              - { label: "Lista largura total", value: list-wide }
              - { label: "Lista", value: list }
            default: cards-wide
            hint: "Controla o estilo de apresentação em todas as páginas: hero, galeria e listagens"
