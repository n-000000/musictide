<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musictide CMS</title>

    <!-- Hide stock photo integrations — no config option exists in Sveltia -->
    <style>
      /* Hide all stock photo service buttons in the media picker nav */
      button[data-name="picsum"],
      button[data-name="unsplash"],
      button[data-name="pexels"],
      button[data-name="pixabay"] {
        display: none !important;
      }
      /* Hide the parent option-group when it contains any stock service */
      .option-group:has(button[data-name="picsum"]) {
        display: none !important;
      }
    </style>

    <script>
      // ── Pre-seed R2 credentials ────────────────────────────────────
      // Sveltia prompts for the R2 secret key on each new browser session.
      // Since our fetch interceptor strips AWS auth and uses GitHub OAuth
      // instead, the actual value is irrelevant — we just need to suppress
      // the prompt. Pre-seed a dummy value in Sveltia's prefs storage.
      (function () {
        try {
          const prefs = JSON.parse(localStorage.getItem('sveltia-cms.prefs') || '{}');
          if (!prefs.apiKeys || !prefs.apiKeys.cloudflare_r2) {
            prefs.apiKeys = prefs.apiKeys || {};
            prefs.apiKeys.cloudflare_r2 = 'dummy-intercepted-by-proxy';
            localStorage.setItem('sveltia-cms.prefs', JSON.stringify(prefs));
          }
        } catch (e) { /* ignore — worst case user gets the prompt as before */ }
      })();
    </script>

    <script>
      // ── User metadata listener ────────────────────────────────────
      // musictide-auth sends user identity before the Sveltia auth message.
      // We store it here so the fetch interceptor can inject author metadata
      // into GitHub commit API calls, preserving git log attribution.
      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'mt-user-data') {
          try {
            localStorage.setItem('mt-current-user', JSON.stringify(e.data.user));
          } catch (err) { /* ignore — commit author will fall back to service account */ }
        }
      });
    </script>

    <script>
      // ── R2 Proxy Interceptor ─────────────────────────────────────
      // Redirects Sveltia's S3 API calls from R2 to our proxy Worker.
      // PUT uploads use presigned URLs (direct-to-R2) to avoid Worker
      // body size limits. All other ops are proxied through the Worker.
      // Also intercepts GitHub Contents API commits to inject the real
      // user's name/email as the git commit author.
      (function () {
        const R2_HOST = '43220b81420989e7198287bd4559a701.r2.cloudflarestorage.com';
        const PROXY_HOST = 'musictide-media-proxy.leftfield.workers.dev';

        // Try known localStorage keys where Sveltia/Netlify CMS stores the GitHub token.
        function getGitHubToken() {
          const keys = ['sveltia-cms.user', 'sveltia-cms.auth', 'netlify-cms-user', 'decap-cms-user'];
          for (const key of keys) {
            try {
              const raw = localStorage.getItem(key);
              if (raw) {
                const parsed = JSON.parse(raw);
                if (parsed.token) return parsed.token;
              }
            } catch (e) { /* ignore parse errors */ }
          }
          return '';
        }

        // Detect current collection from Sveltia's hash route.
        // e.g. #/collections/ads/entries/... → "ads", #/collections/posts/... → "posts"
        function getCurrentCollection() {
          const match = window.location.hash.match(/#\/collections\/([^/]+)/);
          return match ? match[1] : 'posts';
        }

        const _fetch = window.fetch;

        // Helper: proxy a non-PUT request through the Worker (list, delete, head, get).
        function proxyThroughWorker(url, init) {
          const newUrl = url.replace(R2_HOST, PROXY_HOST);
          const newInit = Object.assign({}, init || {});
          const headers = new Headers(newInit.headers || {});

          headers.delete('authorization');
          headers.delete('x-amz-date');
          headers.delete('x-amz-content-sha256');
          headers.set('Authorization', 'Bearer ' + getGitHubToken());
          headers.set('X-Collection', getCurrentCollection());

          newInit.headers = headers;
          return _fetch.call(window, newUrl, newInit);
        }

        // Progress toast — shown during upload, hidden when done.
        function showUploadProgress(filename) {
          var toast = document.getElementById('mt-upload-toast');
          if (!toast) {
            toast = document.createElement('div');
            toast.id = 'mt-upload-toast';
            toast.style.cssText = [
              'position:fixed', 'bottom:24px', 'right:24px',
              'background:rgba(0,0,0,0.82)', 'color:#fff',
              'padding:10px 16px', 'border-radius:8px',
              'font:13px/1.5 system-ui,sans-serif',
              'z-index:99999', 'min-width:200px',
              'box-shadow:0 4px 16px rgba(0,0,0,0.35)',
              'pointer-events:none',
            ].join(';');
            document.body.appendChild(toast);
          }
          var name = filename.split('/').pop();
          toast.textContent = 'A enviar ' + name + '... 0%';
          toast.style.display = 'block';
          toast.style.opacity = '1';
          return toast;
        }

        function hideUploadProgress() {
          var toast = document.getElementById('mt-upload-toast');
          if (!toast) return;
          toast.style.opacity = '0';
          setTimeout(function() {
            if (toast.style.opacity === '0') toast.style.display = 'none';
          }, 250);
        }

        // Helper: upload via presigned URL using XHR for progress feedback.
        // PUT goes directly to R2 (bypasses Worker body limit).
        function uploadViaPresignedUrl(url, init) {
          // Extract the key from the S3 PUT path: /{bucket}/{key}
          var pathParts = new URL(url).pathname.slice(1).split('/');
          var key = decodeURIComponent(pathParts.slice(1).join('/'));
          var contentType = (init && init.headers)
            ? (new Headers(init.headers)).get('Content-Type') || 'application/octet-stream'
            : 'application/octet-stream';

          // Step 1: ask Worker for a presigned URL
          return _fetch.call(window, 'https://' + PROXY_HOST + '/sign-upload', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + getGitHubToken(),
            },
            body: JSON.stringify({
              key: key,
              contentType: contentType,
              collection: getCurrentCollection(),
            }),
          }).then(function(signRes) {
            if (!signRes.ok) {
              throw new Error('Failed to get presigned upload URL: ' + signRes.status);
            }
            return signRes.json();
          }).then(function(data) {
            var presignedUrl = data.url;
            var toast = showUploadProgress(key);

            // Step 2: PUT directly to R2 via XHR for progress tracking
            return new Promise(function(resolve, reject) {
              var xhr = new XMLHttpRequest();

              xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                  var pct = Math.round((e.loaded / e.total) * 100);
                  var name = key.split('/').pop();
                  toast.textContent = 'A enviar ' + name + '... ' + pct + '%';
                }
              };

              xhr.onload = function() {
                hideUploadProgress();
                resolve(new Response(xhr.response || null, {
                  status: xhr.status,
                  statusText: xhr.statusText,
                }));
              };

              xhr.onerror = function() {
                hideUploadProgress();
                reject(new TypeError('Network request failed'));
              };

              xhr.onabort = function() {
                hideUploadProgress();
                reject(new DOMException('Aborted', 'AbortError'));
              };

              xhr.open('PUT', presignedUrl);
              xhr.setRequestHeader('Content-Type', contentType);
              xhr.send(init.body);
            });
          });
        }

        window.fetch = function (input, init) {
          let url = typeof input === 'string' ? input : input instanceof Request ? input.url : String(input);

          // Inject commit author from stored Google identity into GitHub Contents API calls.
          // Covers both create (PUT) and delete (DELETE) operations.
          var method = (init && init.method) ? init.method.toUpperCase() : 'GET';
          if (
            url.includes('api.github.com/repos') &&
            url.includes('/contents/') &&
            (method === 'PUT' || method === 'DELETE') &&
            init && init.body
          ) {
            try {
              var stored = localStorage.getItem('mt-current-user');
              if (stored) {
                var cmUser = JSON.parse(stored);
                var commitBody = JSON.parse(init.body);
                commitBody.author = { name: cmUser.name, email: cmUser.email };
                var newInit = Object.assign({}, init, { body: JSON.stringify(commitBody) });
                return _fetch.apply(window, [input, newInit]);
              }
            } catch (e) { /* fall through — commit proceeds without explicit author */ }
          }

          if (url.includes(R2_HOST)) {
            var method = (init && init.method) || 'GET';
            if (method.toUpperCase() === 'PUT') {
              return uploadViaPresignedUrl(url, init);
            }
            return proxyThroughWorker(url, init);
          }

          return _fetch.apply(window, arguments);
        };
      })();
    </script>

    <!-- Pin version — do not use @latest. Check https://github.com/sveltia/sveltia-cms/releases for updates. -->
    <script src="https://unpkg.com/@sveltia/cms@0.166.0/dist/sveltia-cms.js"></script>

    <script>
      // ── Hashtag Extraction ───────────────────────────────────────
      // Extract #hashtags from body text into the tags field on save.
      // Body is the source of truth — hashtags stay in the text, tags
      // are always recomputed (replaced, not merged) from the body.
      // The "#" is hidden from readers by client-side JS (extend-footer.html).
      CMS.registerEventListener({
        name: 'preSave',
        handler: ({ entry }) => {
          const body = entry.get('data').get('body');
          if (typeof body !== 'string') return entry.get('data');

          const hashtagPattern = /#([\p{L}\p{N}_-]+)/gu;
          const matches = [...body.matchAll(hashtagPattern)];
          const tags = [...new Set(matches.map(m => m[1].toLowerCase()))];

          return entry.get('data').set('tags', tags);
        },
      });
    </script>
  </head>
  <body>
  </body>
</html>
